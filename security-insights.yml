header:
  schema-version: 2.2.0
  last-updated: 2026-07-03
  last-reviewed: 2026-07-03
  url: https://raw.githubusercontent.com/asketmc/VelesMist/main/security-insights.yml
  comment: >
    Single-repository Security Insights metadata for VelesMist. Release-specific
    fields are intentionally omitted until the first release exists.

project:
  name: VelesMist
  homepage: https://github.com/asketmc/VelesMist
  roadmap: https://github.com/asketmc/VelesMist/issues
  administrators:
    - name: Asketmc
      social: https://github.com/asketmc
      primary: true
  documentation:
    quickstart-guide: https://github.com/asketmc/VelesMist/blob/main/README.md
    code-of-conduct: https://github.com/asketmc/VelesMist/blob/main/CODE_OF_CONDUCT.md
    release-process: https://github.com/asketmc/VelesMist/blob/main/docs/RELEASE_SECURITY.md
    signature-verification: https://github.com/asketmc/VelesMist/blob/main/docs/VERIFY_RELEASE.md
    support-policy: https://github.com/asketmc/VelesMist/blob/main/SECURITY.md
  repositories:
    - name: VelesMist
      url: https://github.com/asketmc/VelesMist
      comment: Primary source repository for the VelesMist CLI.
  vulnerability-reporting:
    reports-accepted: true
    bug-bounty-available: false
    policy: https://github.com/asketmc/VelesMist/blob/main/SECURITY.md
    comment: >
      Use GitHub private vulnerability reporting for exploitable issues or
      sensitive data exposure. Do not publish real Steam credentials, cookies,
      tokens, private inventory exports, generated sell reports, or local cache
      files in public issues.

repository:
  url: https://github.com/asketmc/VelesMist
  status: active
  accepts-change-request: true
  accepts-automated-change-request: true
  bug-fixes-only: false
  core-team:
    - name: Asketmc
      social: https://github.com/asketmc
      primary: true
  documentation:
    contributing-guide: https://github.com/asketmc/VelesMist/blob/main/CONTRIBUTING.md
    dependency-management-policy: https://github.com/asketmc/VelesMist/blob/main/docs/OSS_ASSURANCE.md
    governance: https://github.com/asketmc/VelesMist/blob/main/.github/CODEOWNERS
    review-policy: https://github.com/asketmc/VelesMist/blob/main/.github/pull_request_template.md
    security-policy: https://github.com/asketmc/VelesMist/blob/main/SECURITY.md
  license:
    url: https://github.com/asketmc/VelesMist/blob/main/LICENSE
    expression: MIT
  security:
    assessments:
      self:
        name: OSS assurance self-assessment
        evidence: https://github.com/asketmc/VelesMist/blob/main/docs/OSS_ASSURANCE.md
        date: 2026-07-03
        comment: >
          Self-assessment only. This project is not certified secure and has
          not undergone a formal external audit.
