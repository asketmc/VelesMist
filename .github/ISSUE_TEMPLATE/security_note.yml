name: Security note
description: Ask about a suspected security issue without exposing secrets.
title: "[Security]: "
labels:
  - security
body:
  - type: markdown
    attributes:
      value: |
        Do not post real Steam passwords, Steam Guard codes, cookies, session IDs, API keys, private inventory exports, generated sell reports, or local cache files.
        If this is exploitable or sensitive, stop here and open a private GitHub security advisory instead.
  - type: dropdown
    id: sensitivity
    attributes:
      label: Sensitivity
      options:
        - Public note is safe; no secrets or private artifacts included.
        - This may be sensitive; I will use private disclosure instead.
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Credential or token handling
        - Network behavior
        - Release artifact verification
        - Dependency or supply-chain risk
        - Privacy or report disclosure
        - Other
    validations:
      required: true
