name: Semgrep

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "53 2 * * 2"

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Semgrep
        run: |
          python3 -m pip install --user semgrep
          "$HOME/.local/bin/semgrep" scan --config p/golang --config p/security-audit --sarif --output semgrep.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: semgrep.sarif
