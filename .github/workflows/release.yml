name: Release Security

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Build release artifacts
        env:
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ github.event.release.published_at }}
          DIRTY: clean
        run: |
          set -euo pipefail
          mkdir -p dist archives
          ldflags="-s -w -X github.com/asketmc/VelesMist/internal/version.Version=${VERSION} -X github.com/asketmc/VelesMist/internal/version.Commit=${COMMIT} -X github.com/asketmc/VelesMist/internal/version.BuildDate=${BUILD_DATE} -X github.com/asketmc/VelesMist/internal/version.Dirty=${DIRTY}"
          for target in linux/amd64 linux/arm64 windows/amd64 windows/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            name="velesmist-${VERSION}-${os}-${arch}"
            out="dist/${name}"
            if [ "$os" = "windows" ]; then out="${out}.exe"; fi
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="$ldflags" -o "$out" ./cmd/velesmist
            if [ "$os" = "windows" ]; then
              (cd dist && zip "../archives/${name}.zip" "$(basename "$out")")
            else
              (cd dist && tar -czf "../archives/${name}.tar.gz" "$(basename "$out")")
            fi
          done
      - name: SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: .
          format: spdx-json
          output-file: archives/sbom.spdx.json
          upload-artifact: false
      - name: CycloneDX SBOM
        uses: CycloneDX/gh-gomod-generate-sbom@efc74245d6802c8cefd925620515442756c70d8f # v2.0.0
        with:
          version: v1.10.0
          args: mod -licenses -json -output archives/sbom.cdx.json
      - name: Create checksums
        run: (cd archives && sha256sum * > SHA256SUMS.txt)
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign release artifacts
        run: |
          set -euo pipefail
          for artifact in archives/*; do
            cosign sign-blob --yes --bundle "${artifact}.sigstore.json" "$artifact"
          done
      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" archives/* --clobber
      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: "archives/*"
