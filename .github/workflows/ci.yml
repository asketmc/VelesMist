name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test-static-build:
    name: CI tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: make format
      - name: Staticcheck
        run: make staticcheck
      - name: Typecheck
        run: make typecheck
      - name: Test
        run: make test
      - name: Coverage
        run: make coverage
      - name: Vet
        run: make vet
      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Build smoke test
        run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o dist/velesmist ./cmd/velesmist
      - name: CLI version smoke test
        run: ./dist/velesmist version
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
