name: REUSE

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  reuse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: REUSE lint
        run: |
          python3 -m pip install --user reuse
          "$HOME/.local/bin/reuse" lint
